<!DOCTYPE html>
<html>
<head>
<title>Track Complaint - WaterTrack PK</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#00c6ff,#0099cc,#00d4aa,#0072ff);
background-size:400% 400%;
animation:bgMove 15s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card-box{
background:rgba(255,255,255,0.2);
backdrop-filter:blur(20px);
padding:40px;
border-radius:20px;
width:500px;
color:white;
box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

.status-step{
padding:10px;
margin:10px 0;
border-radius:10px;
background:white;
color:#0099cc;
font-weight:bold;
}

.status-step.active{
background:#00ffff;
color:white;
}
</style>
</head>

<body>

<div class="card-box">

<h4 class="text-center mb-4">
<i class="bi bi-search"></i> Track Complaint
</h4>

<div class="mb-3">
<label>Enter Complaint ID</label>
<input type="text" id="complaintInput" class="form-control" placeholder="CP12345">
</div>

<button class="btn btn-info w-100 mb-3" onclick="trackComplaint()">
Track Status
</button>

<div id="statusResult" style="display:none;">

<div class="status-step active">Complaint Received</div>
<div class="status-step" id="step2">Under Investigation</div>
<div class="status-step" id="step3">Resolved</div>

</div>

</div>

<script>
function trackComplaint(){
document.getElementById("statusResult").style.display="block";

setTimeout(()=>{
document.getElementById("step2").classList.add("active");
},1000);

setTimeout(()=>{
document.getElementById("step3").classList.add("active");
},2000);
}
</script>

</body>
</html>
