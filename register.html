{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Register - WaterTrack PK</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="auth-bg">
    <div class="auth-container">
        <div class="auth-card">
            <h2>Create Account</h2>
            <form method="POST" id="registerForm">
                {% csrf_token %}
                <input type="text" name="username" id="name" class="form-control" placeholder="Username" required>
                <input type="password" name="password" id="password" class="form-control" placeholder="Password" required>
                <button type="submit" class="btn-glow">Register</button>
            </form>
            <p style="text-align:center; margin-top:15px;">
                <a href="{% url 'login' %}" style="color:white; text-decoration:none;">Already have an account? Login</a>
            </p>
        </div>
    </div>
    <script src="{% static 'js/validation.js' %}"></script>
</body>
</html>
