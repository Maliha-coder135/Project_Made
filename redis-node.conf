# Redis Node Configuration — PDC Project 6B
# Applied to all cluster nodes

port 7001
bind 0.0.0.0

# ── CLUSTER ───────────────────────────────────────────────
cluster-enabled yes
cluster-config-file nodes.conf
cluster-node-timeout 5000
cluster-announce-hostname ""

# ── PERSISTENCE ───────────────────────────────────────────
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ── MEMORY ────────────────────────────────────────────────
maxmemory 256mb
maxmemory-policy allkeys-lru

# ── PERFORMANCE ───────────────────────────────────────────
tcp-backlog 511
timeout 0
tcp-keepalive 300
hz 10
dynamic-hz yes

# ── LOGGING ───────────────────────────────────────────────
loglevel notice
logfile ""

# ── SECURITY (remove in production and add requirepass) ───
protected-mode no
