<!DOCTYPE html>
<html>
<head>
<title>Provider Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-success">
<div class="container">
<span class="navbar-brand">Tanker Provider Dashboard</span>
<a href="../index.html" class="btn btn-light">Logout</a>
</div>
</nav>

<div class="container mt-4">

<div class="card shadow p-4 mb-4">
<h4>Manage Fleet</h4>
<button class="btn btn-primary mb-3">Add New Tanker</button>

<table class="table table-bordered table-hover">
<thead class="table-success">
<tr>
<th>Tanker ID</th>
<th>Capacity</th>
<th>Registration No</th>
<th>Availability</th>
<th>Action</th>
</tr>
</thead>
<tbody>
<tr>
<td>TK1001</td>
<td>1000 Gallons</td>
<td>RWP-1234</td>
<td><span class="badge bg-success">Available</span></td>
<td><button class="btn btn-warning btn-sm">Edit</button></td>
</tr>
</tbody>
</table>
</div>

<div class="card shadow p-4">
<h4>Assigned Orders</h4>
<table class="table table-bordered">
<thead class="table-success">
<tr>
<th>Booking ID</th>
<th>Customer</th>
<th>Address</th>
<th>Status</th>
<th>Update</th>
</tr>
</thead>
<tbody>
<tr>
<td>BK1023</td>
<td>Ahmed Khan</td>
<td>Satellite Town, Rawalpindi</td>
<td>Confirmed</td>
<td>
<select class="form-select form-select-sm">
<option>Confirmed</option>
<option>Dispatched</option>
<option>Delivered</option>
<option>Cancelled</option>
</select>
</td>
</tr>
</tbody>
</table>
</div>

</div>

</body>
</html>
